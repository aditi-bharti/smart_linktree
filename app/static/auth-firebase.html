<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart LinkTree - Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .google-btn {
            background: white;
            color: #444;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .google-btn:hover {
            background: #f8f8f8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #888;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }
        
        .divider span {
            padding: 0 16px;
            font-size: 14px;
        }
        
        .firebase-notice {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin: 16px 0;
            font-size: 14px;
            color: #00ff41;
        }
        
        .firebase-notice.error {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔗 Smart LinkTree</h1>
            <p class="auth-subtitle">Sign in to manage your links</p>
            
            <!-- Firebase Notice -->
            <div id="firebase-notice" class="firebase-notice" style="display: none;">
                ⚠️ Firebase not configured. Using traditional login only.
            </div>
            
            <!-- Google Sign-In Button -->
            <div id="google-signin-section">
                <button id="google-signin-btn" class="google-btn" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    <span>Continue with Google</span>
                </button>
                
                <div class="divider">
                    <span>OR</span>
                </div>
            </div>
            
            <!-- Traditional Login/Signup Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>
            
            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" style="display: none;" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="signup-role">
                        <option value="free">Free</option>
                        <option value="premium">Premium</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <select id="signup-position">
                        <option value="guest">Guest</option>
                        <option value="student">Student</option>
                        <option value="developer">Developer</option>
                        <option value="hr">HR</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // TODO: Replace with your Firebase config
        // Get this from Firebase Console > Project Settings > General > Your apps
const firebaseConfig = {   apiKey: "AIzaSyDcntlXnHhVdGm3DF5YNuX_-AhGfpL-42c",   authDomain: "smart-linktree.firebaseapp.com",   projectId: "smart-linktree",   storageBucket: "smart-linktree.firebasestorage.app",   messagingSenderId: "282975182951",   appId: "1:282975182951:web:9b2c36356dd6004ff174c2",   measurementId: "G-3RHDWRWF8R" };

        // Check if Firebase config is set
        if (firebaseConfig.apiKey === "YOUR_API_KEY") {
            document.getElementById('firebase-notice').style.display = 'block';
            document.getElementById('google-signin-section').style.display = 'none';
            console.warn('Firebase not configured. Please update firebaseConfig in auth-firebase.html');
        } else {
            // Import Firebase modules
            import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
            import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            // Make auth available globally
            window.firebaseAuth = auth;
            window.googleProvider = provider;
            window.signInWithPopup = signInWithPopup;
        }
    </script>

    <script src="/static/navigation.js"></script>
    <script>
        function switchAuthTab(tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabs = document.querySelectorAll('.auth-tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    alert('Login failed: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('signup-role').value;
            const position = document.getElementById('signup-position').value;
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, role, position })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    alert('Signup failed: ' + (error.detail || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function signInWithGoogle() {
            if (!window.firebaseAuth) {
                alert('Firebase not configured. Please check console for instructions.');
                return;
            }

            const btn = document.getElementById('google-signin-btn');
            btn.disabled = true;
            btn.innerHTML = '<span>Signing in...</span>';
            
            try {
                // Sign in with Google popup
                const result = await window.signInWithPopup(window.firebaseAuth, window.googleProvider);
                
                // Get Firebase ID token
                const idToken = await result.user.getIdToken();
                
                // Send to backend
                const response = await fetch('/api/auth/firebase-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id_token: idToken })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    alert('Google Sign-In failed: ' + (error.detail || 'Unknown error'));
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"><span>Continue with Google</span>';
                }
            } catch (error) {
                console.error('Google Sign-In error:', error);
                alert('Google Sign-In failed: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"><span>Continue with Google</span>';
            }
        }

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
