<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart LinkTree — Sign in</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-mark"></div>
        <span class="auth-logo-name">Smart LinkTree</span>
      </div>

      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subheading">Sign in to manage your links</p>

      <div id="firebase-notice" class="firebase-notice" style="display:none;">
        Google Sign-In is unavailable. Use username and password below.
      </div>

      <div id="google-signin-section">
        <button id="google-signin-btn" class="google-btn" onclick="signInWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
          Continue with Google
        </button>
      </div>

      <div class="auth-divider">or</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login', this)">Sign in</button>
        <button class="auth-tab" onclick="switchTab('signup', this)">Create account</button>
      </div>

      <div id="error-msg" class="alert alert-error" style="display:none;"></div>

      <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <form id="signup-form" class="auth-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signup-username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Role</label>
            <select id="signup-role">
              <option value="free">Free</option>
              <option value="premium">Premium</option>
            </select>
          </div>
          <div class="form-group">
            <label>Position</label>
            <select id="signup-position">
              <option value="guest">Guest</option>
              <option value="student">Student</option>
              <option value="developer">Developer</option>
              <option value="hr">HR</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAubq4cIpLFoV7IRFrsbUXYIkWaTEjQoBQ",
      authDomain: "smart-linktree-a0df9.firebaseapp.com",
      projectId: "smart-linktree-a0df9",
      storageBucket: "smart-linktree-a0df9.firebasestorage.app",
      messagingSenderId: "983793750987",
      appId: "1:983793750987:web:e80c5b819c0b1383089c4e"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      window.firebaseAuth = auth;
      window.googleProvider = provider;
      window.signInWithPopup = signInWithPopup;
    } catch (e) {
      document.getElementById('firebase-notice').style.display = 'block';
      document.getElementById('google-signin-section').style.display = 'none';
    }
  </script>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

    function switchTab(tab, btn) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tab + '-form').classList.add('active');
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'flex';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.detail || 'Invalid username or password.');
        }
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      hideError();
      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Creating account…';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('signup-username').value,
            email: document.getElementById('signup-email').value,
            password: document.getElementById('signup-password').value,
            role: document.getElementById('signup-role').value,
            position: document.getElementById('signup-position').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.detail || 'Could not create account.');
        }
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    }

    async function signInWithGoogle() {
      if (!window.firebaseAuth) {
        showError('Google Sign-In is not available right now.');
        return;
      }
      const btn = document.getElementById('google-signin-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
      try {
        const result = await window.signInWithPopup(window.firebaseAuth, window.googleProvider);
        const idToken = await result.user.getIdToken();
        const res = await fetch('/api/auth/firebase-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard.html';
        } else {
          showError(data.detail || 'Google Sign-In failed.');
          btn.disabled = false;
          btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt=""> Continue with Google';
        }
      } catch (err) {
        showError('Google Sign-In failed: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt=""> Continue with Google';
      }
    }
  </script>
</body>
</html>
