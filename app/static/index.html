<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart LinkTree</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Position Display (shows logged-in user's position) -->
        <div id="role-selector" class="role-selector">
            <!-- Will be populated by JavaScript based on user's stored position -->
        </div>
        
        <div id="profile-section" class="profile-section">
            <!-- Profile will be loaded here -->
        </div>
        <div id="links-section" class="links-section">
            <!-- Links will be loaded here -->
        </div>
        <div id="visitor-info" class="visitor-info">
            <!-- Visitor info will be shown here -->
        </div>
    </div>

    <script src="/static/script.js?v=2"></script>
</body>
</html>
