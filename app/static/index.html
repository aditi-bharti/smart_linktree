<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Smart LinkTree</title>
  <link rel="stylesheet" href="/static/styles.css?v=3">
  <style>
    body { background: var(--gray-50); }
    .public-page { min-height: 100vh; padding: 32px 16px; }
    .powered-by {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--gray-300);
    }
    .powered-by a { color: var(--gray-400); text-decoration: none; }
    .powered-by a:hover { color: var(--gray-600); }
  </style>
</head>
<body>
  <div class="public-page">
    <div id="role-selector" class="role-selector"></div>
    <div id="profile-section" class="profile-section"></div>
    <div id="links-section" class="links-section"></div>
    <div id="visitor-info" class="visitor-info"></div>
    <p class="powered-by">Powered by <a href="/">Smart LinkTree</a></p>
  </div>
  <script src="/static/script.js?v=3"></script>
</body>
</html>
