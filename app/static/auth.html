<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Smart LinkTree - Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .google-btn {
            background: white;
            color: #444;
            border: 1px solid #ddd;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .google-btn:hover {
            background: #f8f8f8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .google-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #888;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }
        
        .divider span {
            padding: 0 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="auth-section">
            <!-- Login/Signup will be loaded here -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDcntlXnHhVdGm3DF5YNuX_-AhGfpL-42c",
            authDomain: "smart-linktree.firebaseapp.com",
            projectId: "smart-linktree",
            storageBucket: "smart-linktree.firebasestorage.app",
            messagingSenderId: "282975182951",
            appId: "1:282975182951:web:9b2c36356dd6004ff174c2",
            measurementId: "G-3RHDWRWF8R"
        };

        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Initialize Firebase
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            // Make auth available globally
            window.firebaseAuth = auth;
            window.googleProvider = provider;
            window.signInWithPopup = signInWithPopup;
            window.firebaseInitialized = true;
            
            console.log('✅ Firebase initialized successfully');
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            window.firebaseInitialized = false;
        }
    </script>

    <script src="/static/auth.js?v=1737900000"></script>
</body>
</html>
